<canvas id="matrixCanvas"></canvas>

<div class="login-box glow">
    <h2 class="glow">ACCESS TERMINAL</h2>

    <input type="text" class="input-field" placeholder="Enter Username">
    <input type="password" class="input-field" placeholder="Enter Password">

    <button class="btn" onclick="login()">INITIATE LOGIN</button>

    <p id="typingText"></p>
</div>

<script>
let text = "Initializing secure system... OK\nVerifying user access... READY";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typingText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();
</script>
