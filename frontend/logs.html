<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threat Logs - SecureDesk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <h2>SecureDesk</h2>
    <a href="index.html">Dashboard</a>
    <a href="scan.html">Scan File</a>
    <a href="quarantine.html">Quarantine</a>
    <a class="active" href="logs.html">Threat Logs</a>
</div>

<div class="main">
    <div class="card">
        <h2 class="card-title">Threat Logs</h2>
        <div id="logsBox" class="log-box">Loading logs...</div>
    </div>
</div>

<script>
fetch("/api/logs")
    .then(res => res.json())
    .then(data => {
        document.getElementById("logsBox").innerText = JSON.stringify(data, null, 4);
    })
    .catch(() => {
        document.getElementById("logsBox").innerText = "Failed to load logs.";
    });
</script>

</body>
</html>
